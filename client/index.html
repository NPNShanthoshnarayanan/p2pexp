<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P File Share</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>P2P File Share</h1>

        <!-- ── SEEDER SECTION ── -->
        <div class="card" id="seeder-section">
            <h2>Share a File</h2>

            <div class="file-drop" id="file-drop">
                <p>Drop file here or</p>
                <label for="file-input" class="btn">Choose File</label>
                <input type="file" id="file-input" hidden>
                <p id="selected-file" class="file-name"></p>
            </div>

            <button class="btn btn-primary" id="share-btn" disabled>Share File</button>

            <div class="share-result hidden" id="share-result">
                <p>Share this link with your friends:</p>
                <div class="share-link-box">
                    <span id="share-link"></span>
                    <button class="btn btn-small" id="copy-btn">Copy</button>
                </div>
                <p class="peers-info">Connected peers: <span id="seeder-peer-count">0</span></p>
            </div>
        </div>

        <div class="divider">OR</div>

        <!-- ── LEECHER SECTION ── -->
        <div class="card" id="leecher-section">
            <h2>Download a File</h2>

            <div class="input-row">
                <input type="text" id="room-input" placeholder="Paste share link or room code" />
                <button class="btn btn-primary" id="download-btn">Download</button>
            </div>

            <div class="download-status hidden" id="download-status">
                <p id="file-info"></p>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
                <p id="progress-text">0%</p>
                <p class="peers-info">Connected peers: <span id="leecher-peer-count">0</span></p>
            </div>
        </div>
    </div>

    <!-- scripts loaded in dependency order -->
    <script src="js/verifier.js"></script>
    <script src="js/chunker.js"></script>
    <script src="js/manifest.js"></script>
    <script src="js/tracker.js"></script>
    <script src="js/peer.js"></script>
    <script src="js/swarm.js"></script>
    <script src="js/downloader.js"></script>
    <script src="js/ui.js"></script>
</body>
</html>
